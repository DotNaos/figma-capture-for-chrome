name: Build and Release

on:
    push:
        branches:
            - main
        tags:
            - 'v*'

jobs:
    build:
        runs-on: ubuntu-latest
        concurrency:
            group: release-${{ github.ref }}
            cancel-in-progress: true
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Package
              run: npm run package

            - name: Determine release metadata
              id: release_meta
              run: |
                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                    echo "release_name=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag_name=main-latest" >> "$GITHUB_OUTPUT"
                    echo "release_name=Main snapshot (${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"
                    echo "prerelease=true" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  GITHUB_REF_TYPE: ${{ github.ref_type }}
                  GITHUB_REF_NAME: ${{ github.ref_name }}
                  GITHUB_SHA: ${{ github.sha }}

            - name: Move rolling main tag
              if: github.ref_type != 'tag'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag -f main-latest "$GITHUB_SHA"
                  git push origin refs/tags/main-latest --force
              env:
                  GITHUB_SHA: ${{ github.sha }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: figma-capture
                  path: figma-capture.zip

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release_meta.outputs.tag_name }}
                  target_commitish: ${{ github.sha }}
                  name: ${{ steps.release_meta.outputs.release_name }}
                  prerelease: ${{ steps.release_meta.outputs.prerelease }}
                  generate_release_notes: true
                  files: figma-capture.zip
