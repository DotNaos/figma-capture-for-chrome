<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Figma Capture</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    
    <body>
        <main class="popup-shell">
            <section class="popup-card">
                <header class="popup-header">
                    <div class="figma-mark" aria-hidden="true">
                        <svg class="h-8 w-8" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                            <path d="M11 30c2.761 0 5-2.239 5-5v-5h-5c-2.761 0-5 2.239-5 5s2.239 5 5 5z" fill="#0acf83" />
                            <path d="M6 15c0-2.761 2.239-5 5-5h5v10h-5c-2.761 0-5-2.239-5-5z" fill="#a259ff" />
                            <path d="M6 5c0-2.761 2.239-5 5-5h5v10h-5c-2.761 0-5-2.239-5-5z" fill="#f24e1e" />
                            <path d="M16 0h5c2.761 0 5 2.239 5 5s-2.239 5-5 5h-5V0z" fill="#ff7262" />
                            <path d="M26 15c0 2.761-2.239 5-5 5s-5-2.239-5-5 2.239-5 5-5 5 2.239 5 5z" fill="#1abcfe" />
                        </svg>
                    </div>

                    <button id="btn-capture" class="primary-button" type="button">
                        <span class="button-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M5 8h2.2l1.1-1.6c.18-.27.49-.4.81-.4h5.8c.32 0 .63.13.81.4L16.8 8H19a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2Z"
                                    stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
                                <circle cx="12" cy="13" r="3" stroke="currentColor" stroke-width="1.7" />
                            </svg>
                        </span>
                        <span id="capture-label">Capture current tab</span>
                    </button>
                </header>

                <output id="status" class="status-banner" hidden aria-live="polite"></output>

                <section class="config-section">
                    <div class="config-heading-row">
                        <h1 class="config-heading">Configuration</h1>
                    </div>

                    <div class="field-stack">
                        <label class="sr-only" for="input-capture-id">Capture Id</label>
                        <input id="input-capture-id" class="field-input" type="text" placeholder="Capture Id" />

                        <label class="sr-only" for="input-endpoint">Endpoint</label>
                        <input id="input-endpoint" class="field-input" type="text" placeholder="Endpoint" />
                        </div>
                        </section>
<div class="save-row">
    <button id="btn-save" class="secondary-button" type="button">
        <span class="button-icon button-icon--small" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 4h11l3 3v13H5V4Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
                <path d="M8 4v5h8V4" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
                <path d="M9 20v-5h6v5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
            </svg>
        </span>
        <span>Save Config</span>
    </button>
                </div>
            </section>
            </main>
        <script src="popup.js"></script>
        </body>
</html>
