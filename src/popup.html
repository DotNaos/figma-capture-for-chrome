<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <svg class="logo" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M50 300c27.6 0 50-22.4 50-50v-50H50c-27.6 0-50 22.4-50 50s22.4 50 50 50z" fill="#0acf83"/>
          <path d="M0 150c0-27.6 22.4-50 50-50h50v100H50c-27.6 0-50-22.4-50-50z" fill="#a259ff"/>
          <path d="M0 50C0 22.4 22.4 0 50 0h50v100H50C22.4 100 0 77.6 0 50z" fill="#f24e1e"/>
          <path d="M100 0h50c27.6 0 50 22.4 50 50s-22.4 50-50 50h-50V0z" fill="#ff7262"/>
          <path d="M200 150c0 27.6-22.4 50-50 50s-50-22.4-50-50 22.4-50 50-50 50 22.4 50 50z" fill="#1abcfe"/>
        </svg>
        <h1>Figma Capture</h1>
      </header>

      <button id="btn-capture" class="btn-primary" type="button">
        Capture current tab
      </button>

      <div id="status" class="status" hidden></div>

      <section class="config">
        <h2>Configuration</h2>
        <label for="input-capture-id">Capture ID</label>
        <input id="input-capture-id" type="text" placeholder="Leave empty for clipboard mode" />

        <label for="input-endpoint">Endpoint</label>
        <input id="input-endpoint" type="text" placeholder="Leave empty for clipboard mode" />

        <button id="btn-save" class="btn-secondary" type="button">Save config</button>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
